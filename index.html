<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spin & Win - Monkey Garage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
}

/* 🔷 Header */
.header {
    width: 100%;
    height: 130px;
    background: #C9D6DC;
    display: flex;
    align-items: center;
    justify-content: center;
}

.logo {
    max-height: 80px;
}

/* 🎯 Wheel */
#wheel-container {
    position: relative;
    width: 320px;
    margin: 30px auto;
}

#wheel {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 8px solid #fff;
    position: relative;
    overflow: hidden;
    transition: transform 4s ease-out;
}

.slice {
    position: absolute;
    width: 50%;
    height: 50%;
    top: 50%;
    left: 50%;
    transform-origin: 0% 0%;
}

.slice span {
    position: absolute;
    top: 60%;
    left: 10px;
    font-size: 12px;
    color: #fff;
    font-weight: bold;
    transform-origin: 0 0;
}

/* 🔻 Pointer */
#pointer {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
}

/* 🔘 Button */
button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: orange;
    color: #000;
    cursor: pointer;
}

button:disabled {
    background: gray;
}

/* 🌫 Blur */
.blur {
    filter: blur(8px);
}

/* 📦 Popup */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(15px);
    background: rgba(0,0,0,0.3);
}

.popup-box {
    background: rgba(255,255,255,0.9);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    width: 80%;
    max-width: 300px;
    color: #000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.popup-box button {
    margin-top: 15px;
    background: #007AFF;
    color: #fff;
}
</style>
</head>

<body>

<!-- 🔷 Header -->
<div class="header">
    <img src="https://via.placeholder.com/200x80?text=MonkeyGarage" class="logo">
</div>

<h2>🎯 Spin & Win</h2>

<div id="wheel-container">
    <div id="pointer">▼</div>
    <div id="wheel"></div>
</div>

<button onclick="spin()" id="spinBtn">SPIN</button>

<!-- 🎉 Popup -->
<div id="popup" class="popup">
  <div class="popup-box">
    <h2 id="popup-title"></h2>
    <p id="popup-code"></p>
    <button onclick="goToSite()">Go Now</button>
  </div>
</div>

<script>
// 🎁 Rewards (EDIT HERE)
const rewards = [
    { label: "5% OFF", code: "MG5", weight: 40 },
    { label: "10% OFF", code: "MG10", weight: 30 },
    { label: "20% OFF", code: "MG20", weight: 15 },
    { label: "50% OFF", code: "MG50", weight: 2 },
    { label: "TRY AGAIN", code: "", weight: 50 }
];

const wheel = document.getElementById("wheel");
const spinBtn = document.getElementById("spinBtn");

const total = rewards.length;
const angle = 360 / total;

// 🎨 Create slices
rewards.forEach((reward, i) => {
    let slice = document.createElement("div");
    slice.className = "slice";

    slice.style.transform = `rotate(${i * angle}deg) skewY(${90 - angle}deg)`;
    slice.style.background = `hsl(${i * 70}, 70%, 50%)`;

    let text = document.createElement("span");
    text.innerText = reward.label;
    text.style.transform = `rotate(${angle/2}deg) skewY(${-(90 - angle)}deg)`;

    slice.appendChild(text);
    wheel.appendChild(slice);
});

// 🎲 Weighted random
function getWeightedReward() {
    let totalWeight = rewards.reduce((sum, r) => sum + r.weight, 0);
    let random = Math.random() * totalWeight;

    for (let reward of rewards) {
        if (random < reward.weight) return reward;
        random -= reward.weight;
    }
}

let selectedReward = null;
let countdownInterval = null;

// 🎡 Spin
function spin() {

    if (localStorage.getItem("spun")) {
        alert("You already used your spin!");
        return;
    }

    localStorage.setItem("spun", true);
    spinBtn.disabled = true;

    const selected = getWeightedReward();
    selectedReward = selected;

    const index = rewards.indexOf(selected);

    const randomOffset = Math.random() * angle;
    const rotation = 360 * 5 + (index * angle) + randomOffset;

    wheel.style.transform = `rotate(-${rotation}deg)`;

    setTimeout(() => {
        showPopup(selected);
    }, 4000);
}

// 🎉 Popup + Countdown
function showPopup(reward) {
    const popup = document.getElementById("popup");

    document.body.classList.add("blur");

    document.getElementById("popup-title").innerText =
        reward.code ? reward.label + " 🎉" : "Better luck next time 😢";

    let countdown = 10;

    document.getElementById("popup-code").innerHTML =
        reward.code
        ? `Use Code: <b>${reward.code}</b><br><br>Redirecting in <span id="count">${countdown}</span>s`
        : `Redirecting in <span id="count">${countdown}</span>s`;

    popup.style.display = "flex";

    countdownInterval = setInterval(() => {
        countdown--;
        document.getElementById("count").innerText = countdown;

        if (countdown <= 0) {
            clearInterval(countdownInterval);
            goToSite();
        }
    }, 1000);
}

// 🔗 Redirect
function goToSite() {
    clearInterval(countdownInterval);

    if (selectedReward && selectedReward.code) {
        window.location.href = `https://monkeygarage.in/?coupon=${selectedReward.code}`;
    } else {
        window.location.href = "https://monkeygarage.in";
    }
}
</script>

</body>
</html>
