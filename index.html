<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spin & Win - Monkey Garage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Lato',sans-serif; }

/* HEADER */
header {
  width:100%;
  background:skyblue;
  padding:15px;
}
header img { height:40px; }

/* BODY */
body {
  background:linear-gradient(135deg,#e6f7ff,#ffffff);
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* WHEEL */
#spin_the_wheel {
  position:relative;
  margin-top:40px;
}
#wheel {
  width:90vw;
  max-width:500px;
}

/* BUTTON */
#spin {
  position:absolute;
  top:50%; left:50%;
  width:30%; height:30%;
  transform:translate(-50%,-50%);
  background:white;
  color:skyblue;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:50%;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 0 8px skyblue,0 0 15px rgba(0,0,0,0.3);
}

/* POINTER */
#spin::after {
  content:"";
  position:absolute;
  top:-20px;
  border:12px solid transparent;
  border-bottom-color:skyblue;
}

/* POPUP */
#popup {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}
#popupContent {
  background:white;
  padding:25px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>
    <body>
<header>
  <img src="https://via.placeholder.com/120x40?text=LOGO">
</header>
        <div id="spin_the_wheel">
  <canvas id="wheel" width="500" height="500"></canvas>
  <div id="spin">SPIN</div>
            
</div>
      <div id="popup">
  <div id="popupContent">
    <h2 id="resultText"></h2>
    <p id="couponText"></p>
    <p>Redirecting in 10 seconds...</p>
  </div>
</div>
  
<script>
const sectors = [
  { color:"#ffffff", text:"#00aaff", label:"Sweets", weight:30, coupon:"SWEET10" },
  { color:"#00aaff", text:"#ffffff", label:"Prize draw", weight:20, coupon:"PRIZE50" },
  { color:"#ffffff", text:"#00aaff", label:"Sweets", weight:15, coupon:"SWEET5" },
  { color:"#00aaff", text:"#ffffff", label:"Prize draw", weight:10, coupon:"PRIZE20" },
  { color:"#ffffff", text:"#00aaff", label:"Combo", weight:5, coupon:"COMBO100" },
  { color:"#00aaff", text:"#ffffff", label:"You lose", weight:15, coupon:"TRYAGAIN" },
  { color:"#ffffff", text:"#00aaff", label:"Prize", weight:3, coupon:"PRIZE10" },
  { color:"#00aaff", text:"#ffffff", label:"Sweets", weight:2, coupon:"SWEET2" }
];

const redirectURL = "https://yourwebsite.com";

const ctx = document.getElementById("wheel").getContext("2d");
const spinEl = document.getElementById("spin");

const tot = sectors.length;
const PI = Math.PI;
const TAU = 2*PI;
const arc = TAU/tot;
const rad = ctx.canvas.width/2;

let ang=0, angVel=0, targetIndex=null;
const friction=0.992;

/* DRAW */
sectors.forEach((s,i)=>{
  const ang=arc*i;
  ctx.beginPath();
  ctx.fillStyle=s.color;
  ctx.moveTo(rad,rad);
  ctx.arc(rad,rad,rad,ang,ang+arc);
  ctx.fill();

  ctx.save();
  ctx.translate(rad,rad);
  ctx.rotate(ang+arc/2);
  ctx.textAlign="right";
  ctx.fillStyle=s.text;
  ctx.font="bold 16px Lato";
  ctx.fillText(s.label,rad-10,10);
  ctx.restore();
});

/* WEIGHT LOGIC */
function getWeightedIndex(){
  let total=sectors.reduce((a,b)=>a+b.weight,0);
  let r=Math.random()*total;
  for(let i=0;i<tot;i++){
    if(r<sectors[i].weight) return i;
    r-=sectors[i].weight;
  }
  return 0;
}

/* SPIN TO TARGET */
function spinTo(index){
  const targetAngle=(tot-index)*arc;
  angVel=Math.random()*0.2+0.25;
  ang=targetAngle;
}

/* ANIMATION */
function frame(){
  if(!angVel) return;

  angVel*=friction;
  if(angVel<0.002){
    angVel=0;

    const res=sectors[targetIndex];

    document.getElementById("popup").style.display="flex";
    document.getElementById("resultText").innerText="You won: "+res.label;
    document.getElementById("couponText").innerText="Coupon: "+res.coupon;

    setTimeout(()=>{ window.location.href=redirectURL; },10000);
  }

  ang+=angVel;
  ctx.canvas.style.transform=`rotate(${ang-PI/2}rad)`;
}

/* LOOP */
(function engine(){
  frame();
  requestAnimationFrame(engine);
})();

/* CLICK */
spinEl.onclick=()=>{
  if(angVel) return;
  targetIndex=getWeightedIndex();
  spinTo(targetIndex);
};
</script>
 </body>
</html>
